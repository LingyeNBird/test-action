name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          RIGHTCODE_API_KEY: ${{ secrets.RIGHTCODE_API_KEY }}
          RIGHTCODE_BASE_URL: ${{ secrets.RIGHTCODE_BASE_URL }}
          OPENCODE_CONFIG_CONTENT: >-
            {"$schema":"https://opencode.ai/config.json","provider":{"${{ secrets.RIGHTCODE_PROVIDER_ID }}":{"name":"${{ secrets.RIGHTCODE_PROVIDER_ID }}","npm":"@ai-sdk/openai-compatible","api":"{env:RIGHTCODE_BASE_URL}","env":["RIGHTCODE_API_KEY"],"options":{"apiKey":"{env:RIGHTCODE_API_KEY}","baseURL":"{env:RIGHTCODE_BASE_URL}"},"models":{"${{ secrets.RIGHTCODE_MODEL_ID }}":{"name":"${{ secrets.RIGHTCODE_MODEL_ID }}"}}}}}
        with:
          model: ${{ format('{0}/{1}', secrets.RIGHTCODE_PROVIDER_ID, secrets.RIGHTCODE_MODEL_ID) }}