name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
           # 你的供应商 key（在 GitHub Secrets 里新建 RIGHTCODE_API_KEY）
          RIGHTCODE_API_KEY: ${{ secrets.RIGHTCODE_API_KEY }}
          # 注入 OpenCode 配置：自定义 provider + baseURL + model
          OPENCODE_CONFIG_CONTENT: >-
            {"$schema":"https://opencode.ai/config.json","provider":{"rightCode":{"name":"rightCode","npm":"@ai-sdk/openai-compatible","api":"https://right.codes/codex/v1","env":["RIGHTCODE_API_KEY"],"options":{"apiKey":"{env:RIGHTCODE_API_KEY}","baseURL":"https://right.codes/codex/v1"},"models":{"gpt-5.3-codex-high":{"name":"gpt-5.3-codex-high"}}}}}
        with:
          model: rightCode/gpt-5.3-codex-high